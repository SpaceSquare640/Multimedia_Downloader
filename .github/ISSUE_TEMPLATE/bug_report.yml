name: 🐛 Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a report. Please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "e.g. 4.1.0 (see the installer filename or the app title bar)"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: How are you running it?
      options:
        - Desktop app (installer)
        - Web app (web_app.py)
        - From source (npm run tauri dev)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, Linux, macOS]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the ... tab
        2. Paste ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Run Log output
      description: Copy the contents of the **Run Log** tab (or the terminal, for the web app). This is the single most useful thing for diagnosis.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
