name: Release build

# Builds the desktop installers for Linux, macOS, and Windows and uploads them
# to the matching GitHub Release. Triggers on a version tag push (v*), or run
# manually against an existing tag via the "Run workflow" button.
#
# To ship a new version: bump the version numbers + CHANGELOG on `main`, then
# create and push a `vX.Y.Z` tag (`git tag vX.Y.Z && git push origin vX.Y.Z`).
# That's it — no local build required. This workflow creates the GitHub
# Release automatically if one doesn't already exist for the tag (with
# GitHub's auto-generated notes as a placeholder) and uploads all 3
# platforms' installers to it. Polished tri-lingual release notes can be
# added afterwards with `gh release edit vX.Y.Z --notes-file ...` — that's
# independent of the build/upload and can happen before or after.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach installers to (e.g. v4.1.0)"
        required: true
        default: v4.1.0
      only:
        description: "Limit the build to one platform (default: all)"
        type: choice
        default: all
        options:
          - all
          - ubuntu-22.04
          - macos-14
          - windows-latest

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - id: m
        run: |
          only="${{ github.event.inputs.only || 'all' }}"
          if [ "$only" = "all" ]; then
            echo 'matrix={"platform":["ubuntu-22.04","macos-14","windows-latest"]}' >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"platform\":[\"$only\"]}" >> "$GITHUB_OUTPUT"
          fi

      # Runs BEFORE any platform build starts, so there's no race between the
      # 3 parallel jobs over who creates the release. If a release for this
      # tag already exists (e.g. hand-crafted tri-lingual notes via
      # `gh release create`/`gh release edit`), this is a no-op and those
      # notes are left untouched — only missing releases get auto-generated
      # notes as a placeholder.
      - name: Ensure a GitHub Release exists for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — leaving it as-is."
          else
            echo "No release for $tag yet — creating one (edit notes later with"
            echo "'gh release edit $tag --notes-file ...' for polished tri-lingual notes)."
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libappindicator3-dev \
            patchelf

      - name: Build Python engine sidecar (PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller yt-dlp mutagen brotli certifi requests websockets
          pyinstaller packaging/engine_sidecar.spec --noconfirm --distpath packaging/dist --workpath packaging/build

      - name: Stage ffmpeg — Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          mkdir ffmpeg-dl && tar -xf ffmpeg.tar.xz -C ffmpeg-dl --strip-components=1
          cp "$(find ffmpeg-dl -maxdepth 1 -name ffmpeg -type f)" packaging/dist/engine_sidecar/ffmpeg
          chmod +x packaging/dist/engine_sidecar/ffmpeg
          packaging/dist/engine_sidecar/ffmpeg -version | head -1

      - name: Stage ffmpeg — macOS
        if: matrix.platform == 'macos-14'
        run: |
          arch=$(uname -m)                       # arm64 on macos-14
          [ "$arch" = "arm64" ] && a=arm64 || a=amd64
          curl -L -o ffmpeg.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/$a/release/ffmpeg.zip"
          mkdir ffmpeg-dl && unzip -o ffmpeg.zip -d ffmpeg-dl
          cp "$(find ffmpeg-dl -name ffmpeg -type f | head -1)" packaging/dist/engine_sidecar/ffmpeg
          chmod +x packaging/dist/engine_sidecar/ffmpeg
          packaging/dist/engine_sidecar/ffmpeg -version | head -1

      - name: Stage ffmpeg — Windows
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          7z x ffmpeg.zip -offmpeg-dl >/dev/null
          cp "$(find ffmpeg-dl -name ffmpeg.exe -type f | head -1)" packaging/dist/engine_sidecar/ffmpeg.exe
          packaging/dist/engine_sidecar/ffmpeg.exe -version | head -1

      - name: Install JS dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --no-audit --no-fund --prefix frontend

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.setup.outputs.tag }}"
          echo "Uploading bundles to release $tag"
          find src-tauri/target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
               -o -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' \) -print
          find src-tauri/target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
               -o -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' \) \
            -print0 | xargs -0 gh release upload "$tag" --clobber --repo "$GITHUB_REPOSITORY"
